name: Article Review Candidates

on:
  schedule:
    - cron: '11 0 * * 1' # UTC Monday 00:11 = JST Monday 09:11
  workflow_dispatch:
    inputs:
      new_count:
        description: "New article candidates to generate for review (0-3)"
        required: false
        default: "0"
      update_count:
        description: "Existing article update candidates to generate for review (0-3)"
        required: false
        default: "1"
      run_ai:
        description: "Run AI candidate generation before quality checks"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: article-review-candidates
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DISABLE_POST_GENERATION: "false"
      REVIEW_NEW_COUNT: ${{ inputs.new_count || '0' }}
      REVIEW_UPDATE_COUNT: ${{ inputs.update_count || '1' }}
      RUN_AI_REVIEW: ${{ github.event_name != 'workflow_dispatch' || inputs.run_ai }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          submodules: true
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.14.3'
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify deps
        run: |
          python -c "import importlib.util; print('feedparser installed:', importlib.util.find_spec('feedparser') is not None)"
          pip show feedparser || true

      - name: Check duplicate titles/slugs
        run: python scripts/check_unique_posts.py

      - name: Create .env from Secrets (runtime only)
        run: |
          {
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}"
            echo "PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}"
            echo "RAKUTEN_APP_ID=${{ secrets.RAKUTEN_APP_ID }}"
            echo "RAKUTEN_AFFILIATE_ID=${{ secrets.RAKUTEN_AFFILIATE_ID }}"
            echo "BRAVE_SEARCH_API_KEY=${{ secrets.BRAVE_SEARCH_API_KEY }}"
            echo "GOOGLE_CSE_API_KEY=${{ secrets.GOOGLE_CSE_API_KEY }}"
            echo "GOOGLE_CSE_CX=${{ secrets.GOOGLE_CSE_CX }}"
            echo "GSC_SITE_URL=${{ secrets.GSC_SITE_URL }}"
            echo "CSE_DAILY_FREE_LIMIT=100"
            echo "CSE_BUDGET=80"
          } >> .env

          if [ -n "${{ secrets.GSC_SERVICE_ACCOUNT_JSON_B64 }}" ]; then
            echo "${{ secrets.GSC_SERVICE_ACCOUNT_JSON_B64 }}" | base64 -d > .gsc-sa.json
            echo "GSC_SERVICE_ACCOUNT_FILE=.gsc-sa.json" >> .env
          fi

          echo "::add-mask::${{ secrets.OPENAI_API_KEY }}"
          echo "::add-mask::${{ secrets.PEXELS_API_KEY }}"
          echo "::add-mask::${{ secrets.RAKUTEN_APP_ID }}"
          echo "::add-mask::${{ secrets.RAKUTEN_AFFILIATE_ID }}"
          echo "::add-mask::${{ secrets.BRAVE_SEARCH_API_KEY }}"
          echo "::add-mask::${{ secrets.GOOGLE_CSE_API_KEY }}"
          echo "::add-mask::${{ secrets.GOOGLE_CSE_CX }}"
          echo "::add-mask::${{ secrets.GSC_SERVICE_ACCOUNT_JSON_B64 }}"

      - name: Install Hugo
        uses: peaceiris/actions-hugo@v3.0.0
        with:
          hugo-version: '0.155.3'
          extended: true

      - name: Clean old build
        run: rm -rf public resources

      - name: Sanity check script revision
        run: |
          git rev-parse HEAD
          sha1sum scripts/generate_post.py

      - name: Generate review candidates and quality gate site
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -c "import importlib.util; print('feedparser installed:', importlib.util.find_spec('feedparser') is not None)"
          echo "Review candidate settings: new=${REVIEW_NEW_COUNT}, updates=${REVIEW_UPDATE_COUNT}, run_ai=${RUN_AI_REVIEW}"
          if [ "${RUN_AI_REVIEW}" = "true" ] && grep -q '^OPENAI_API_KEY=.' .env; then
            python scripts/site_publish_cycle.py --cycles 1 --count "${REVIEW_NEW_COUNT}" --updates "${REVIEW_UPDATE_COUNT}" --external-supply-check --serp-provider auto --cse-budget 20 --gsc-min-impressions 5 --gsc-min-position 10 --repair-attempts 1 || {
              echo "::warning::AI review candidate generation failed. Continuing with quality gates only."
              python scripts/site_publish_cycle.py --skip-generate --allow-dirty --repair-attempts 1
            }
          else
            echo "::warning::AI candidate generation is disabled or OPENAI_API_KEY is not configured. Running quality gates only."
            python scripts/site_publish_cycle.py --skip-generate --repair-attempts 1
          fi

      - name: Verify requested review candidates were generated
        shell: bash
        run: |
          expected=$((REVIEW_NEW_COUNT + REVIEW_UPDATE_COUNT))
          if [ "${RUN_AI_REVIEW}" != "true" ] || [ "$expected" -le 0 ]; then
            echo "Review candidate generation was not required for this run."
            exit 0
          fi
          mapfile -t changed_candidates < <({ git diff --name-only --diff-filter=ACMRTUXB HEAD -- content data 2>/dev/null || true; git ls-files --others --exclude-standard -- content data 2>/dev/null || true; } | sort -u)
          if [ "${#changed_candidates[@]}" -eq 0 ]; then
            echo "::error::AI review candidate generation was requested (${expected}) but produced no content/data changes."
            exit 1
          fi
          printf 'Generated review candidate changes:\n'
          printf '%s\n' "${changed_candidates[@]}"

      - name: Check changed commercial claims
        shell: bash
        run: |
          mapfile -t changed_commercial < <({ git diff --name-only --diff-filter=ACMRTUXB HEAD -- 'content/**/*.md' 2>/dev/null || true; git ls-files --others --exclude-standard -- 'content/**/*.md' 2>/dev/null || true; } | sort -u)
          python scripts/check_commercial_claims.py "${changed_commercial[@]}"

      - name: Audit expired campaign posts
        run: |
          python scripts/check_expired_campaigns.py --report-only | tee expired-campaigns.txt
          {
            echo "## Expired campaign audit"
            echo
            echo '```text'
            cat expired-campaigns.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build review candidate
        run: |
          hugo --minify
          touch public/.nojekyll
          ls -la public | head -n 50

      - name: Check generated affiliate links
        run: python scripts/check_affiliate_html.py public

      - name: Check generated JSON-LD
        run: python scripts/check_jsonld.py public

      - name: Check search indexing signals
        run: python scripts/check_search_indexing.py public

      - name: Prepare review bundle
        run: |
          python scripts/prepare_review_bundle.py --output-dir .review-output
          cat .review-output/review-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload review bundle
        uses: actions/upload-artifact@v4
        with:
          name: article-review-candidates
          path: .review-output
          if-no-files-found: error
          retention-days: 14

      - name: Prepare failure diagnostics
        if: failure()
        run: |
          mkdir -p .daily-diagnostics
          git status --short > .daily-diagnostics/git-status.txt
          git diff -- content data > .daily-diagnostics/content-data.patch || true
          if [ -f data/supply_gap_report.json ]; then
            cp data/supply_gap_report.json .daily-diagnostics/supply_gap_report.json
          fi

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: article-review-failure-diagnostics
          path: .daily-diagnostics
          if-no-files-found: ignore
          retention-days: 7
