name: Deploy (Hugo)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          submodules: true
          fetch-depth: 0
          persist-credentials: false

      - name: Install Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.155.3'
          extended: true

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.14.3'
          cache: 'pip'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Quality gates
        shell: bash
        run: |
          base="${{ github.event.before }}"
          if [ -z "$base" ] || [[ "$base" =~ ^0+$ ]] || ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            base="$(git rev-parse HEAD^ 2>/dev/null || true)"
          fi
          mapfile -t changed_posts < <(git diff --name-only --diff-filter=ACMRTUXB "$base" HEAD -- 'content/posts/*.md' 2>/dev/null || true)
          if [ "${#changed_posts[@]}" -gt 0 ]; then
            python scripts/check_generated_post_quality.py "${changed_posts[@]}" --min-chars 800 --max-description-chars 140
          else
            echo "No post files changed in this deploy range."
          fi
          mapfile -t changed_commercial < <(git diff --name-only --diff-filter=ACMRTUXB "$base" HEAD -- 'content/**/*.md' 'layouts/**/*.html' 2>/dev/null || true)
          python scripts/check_commercial_claims.py "${changed_commercial[@]}"
          git diff --check "$base" HEAD --
          python scripts/check_links.py
          python scripts/check_unique_posts.py

      - name: Build
        run: |
          rm -rf public resources
          hugo --minify
          touch public/.nojekyll

      - name: Check generated affiliate links
        run: python scripts/check_affiliate_html.py public

      - name: Check generated JSON-LD
        run: python scripts/check_jsonld.py public

      - name: Upload built site
        uses: actions/upload-artifact@v4
        with:
          name: hugo-public
          path: public
          if-no-files-found: error
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Download built site
        uses: actions/download-artifact@v4
        with:
          name: hugo-public
          path: public

      - name: Deploy to Pages
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: false
